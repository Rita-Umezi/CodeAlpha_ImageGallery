<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Image Gallery</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- Header -->
    <header class="gallery-header">
        <h1>My Image Gallery</h1>
        <p>Explore beautiful images with smooth interactions</p>
    </header>

    <!-- Filter Section -->
    <section class="filter-section">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="nature">Nature</button>
        <button class="filter-btn" data-filter="architecture">Architecture</button>
        <button class="filter-btn" data-filter="abstract">Abstract</button>
        <button class="filter-btn" data-filter="people">People</button>
    </section>

    <!-- Search Section -->
    <section class="search-section">
        <input type="text" id="searchInput" placeholder="Search images..." class="search-input">
    </section>

    <!-- Gallery Grid -->
    <main class="gallery-container">
        <div class="gallery-grid" id="galleryGrid">
            <!-- Gallery items will be generated by JavaScript -->
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close" id="lightboxClose">&times;</button>
            <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#10094;</button>
            <img class="lightbox-image" id="lightboxImage" src="" alt="Gallery Image">
            <button class="lightbox-nav lightbox-next" id="lightboxNext">&#10095;</button>
            <div class="lightbox-info">
                <p id="lightboxCaption"></p>
                <p class="lightbox-counter"><span id="currentIndex">1</span> / <span id="totalImages">12</span></p>
            </div>
        </div>
        <div class="lightbox-background" id="lightboxBg"></div>
    </div>

    <script src="gallery.js"></script>
</body>
</html>
